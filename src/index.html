<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sound Player</title>
  <style>
    body {
      font-family: -apple-system, system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    button {
      padding: 16px 48px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: white;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #c73650; }
    button:active { background: #a52a40; }
    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>
  <button id="play-btn">Play Sound</button>
  <p class="hint">Or press Ctrl+Shift+S (even when unfocused)</p>

  <script>
    const { ipcRenderer } = require('electron');
    const path = require('path');

    const audio = new Audio(path.join(__dirname, '..', 'beep.wav'));

    function playSound() {
      audio.currentTime = 0;
      audio.play();
    }

    document.getElementById('play-btn').addEventListener('click', playSound);
    ipcRenderer.on('play-sound', playSound);
  </script>
</body>
</html>
